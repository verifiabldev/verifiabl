name: Bug Report
description: Report incorrect mock behavior or a drift from the real API
labels: ["bug"]
body:
  - type: input
    id: integration
    attributes:
      label: Integration
      placeholder: e.g. stripe
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: Endpoint
      placeholder: e.g. POST /v1/customers
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Response
      description: What the real API returns
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Response
      description: What verifiabl.dev returned
    validations:
      required: true
