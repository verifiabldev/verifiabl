repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: block-private-paths
        name: block private/site paths from being committed
        entry: scripts/block_private_paths.sh
        language: script
        pass_filenames: true
